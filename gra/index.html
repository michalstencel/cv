<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>★ Pong — Michal Stencel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Inter+Tight:wght@500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.5s ease;
    }

    body.asc { background: #000; }

    .nav {
      position: fixed;
      top: 22px;
      left: 22px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 0.1px;
      color: rgba(29,29,31,0.3);
      text-decoration: none;
      transition: color 0.3s, font-family 0s;
      z-index: 10;
    }
    .nav:hover { color: rgba(29,29,31,0.7); }
    body.asc .nav { font-family: 'Courier New', monospace; color: #1a5c1a; }
    body.asc .nav:hover { color: #00FF41; }

    .tip {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 0.1px;
      color: rgba(29,29,31,0.18);
      pointer-events: none;
      transition: color 0.3s;
    }
    body.asc .tip { font-family: 'Courier New', monospace; color: #0d3d0d; }

    canvas {
      display: block;
      transition: box-shadow 0.5s ease;
    }
    body.asc canvas {
      box-shadow: 0 0 60px rgba(0,255,65,0.18), 0 0 120px rgba(0,255,65,0.06);
    }
  </style>
</head>
<body>
  <a class="nav" href="/">← resume</a>
  <canvas id="g"></canvas>
  <p class="tip">move mouse to play &nbsp;·&nbsp; hover green paddle for ASCII mode</p>

  <script>
  (() => {
    'use strict';
    const cv = document.getElementById('g');
    const cx = cv.getContext('2d');
    const W = 800, H = 500;
    cv.width = W; cv.height = H;

    function fit() {
      const vw = innerWidth - 40, vh = innerHeight - 50;
      let w = vw, h = vw * H / W;
      if (h > vh) { h = vh; w = vh * W / H; }
      cv.style.width = (w | 0) + 'px';
      cv.style.height = (h | 0) + 'px';
    }
    fit();
    addEventListener('resize', fit);

    // ── Config ──────────────────────────────────────────────
    const PW = 13, PH = 84, MRG = 26, BS = 12;
    const AI_SPD = 3.8, MAX_SPD = 11;

    // ── State ───────────────────────────────────────────────
    let ascii = false, flicker = 0, resetting = false, started = false;
    const ball = { x: W / 2, y: H / 2, vx: 5, vy: 2.5 };
    const lp = { x: MRG,             y: H / 2 - PH / 2, sc: 0 }; // AI  (red)
    const rp = { x: W - MRG - PW,    y: H / 2 - PH / 2, sc: 0 }; // You (green)
    let mx = W / 2, my = H / 2;

    // ── Input ───────────────────────────────────────────────
    cv.addEventListener('mousemove', e => {
      const r = cv.getBoundingClientRect();
      mx = (e.clientX - r.left) * (W / r.width);
      my = (e.clientY - r.top)  * (H / r.height);
      started = true;
    });
    cv.addEventListener('mouseleave', () => { started = false; });

    function overRightPaddle() {
      return mx > rp.x - 28 && mx < rp.x + PW + 28 &&
             my > rp.y - 8  && my < rp.y + PH + 8;
    }

    // ── Reset ───────────────────────────────────────────────
    function resetBall(dir) {
      resetting = true;
      ball.vx = 0; ball.vy = 0;
      setTimeout(() => {
        ball.x = W / 2;
        ball.y = H / 2 + (Math.random() - 0.5) * 60;
        const d = dir || (Math.random() > 0.5 ? 1 : -1);
        ball.vx = d * (4.5 + Math.random() * 0.8);
        ball.vy = (Math.random() - 0.5) * 5;
        resetting = false;
      }, 700);
    }
    resetBall(1);

    // ── Update ──────────────────────────────────────────────
    function update() {
      if (!started) return;

      // Player paddle tracks mouse
      rp.y = Math.max(0, Math.min(H - PH, my - PH / 2));

      // ASCII mode toggle
      const ov = overRightPaddle();
      if (ov !== ascii) {
        ascii = ov;
        document.body.classList.toggle('asc', ascii);
        if (ascii) flicker = 12;
      }
      if (flicker > 0) flicker--;

      // AI paddle eases toward ball
      const aim = ball.y - PH / 2;
      const diff = aim - lp.y;
      lp.y += Math.sign(diff) * Math.min(AI_SPD, Math.abs(diff));
      lp.y = Math.max(0, Math.min(H - PH, lp.y));

      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Top / bottom walls
      if (ball.y - BS < 0) { ball.y = BS;      ball.vy =  Math.abs(ball.vy); }
      if (ball.y + BS > H) { ball.y = H - BS;  ball.vy = -Math.abs(ball.vy); }

      // Left paddle (AI)
      if (ball.vx < 0 && !resetting &&
          ball.x - BS < lp.x + PW && ball.x + BS > lp.x &&
          ball.y + BS > lp.y      && ball.y - BS < lp.y + PH) {
        ball.vx = Math.abs(ball.vx) * 1.04;
        ball.x  = lp.x + PW + BS;
        ball.vy = ((ball.y - (lp.y + PH / 2)) / (PH / 2)) * 6;
      }

      // Right paddle (player)
      if (ball.vx > 0 && !resetting &&
          ball.x + BS > rp.x      && ball.x - BS < rp.x + PW &&
          ball.y + BS > rp.y      && ball.y - BS < rp.y + PH) {
        ball.vx = -Math.abs(ball.vx) * 1.04;
        ball.x  = rp.x - BS;
        ball.vy = ((ball.y - (rp.y + PH / 2)) / (PH / 2)) * 6;
      }

      // Speed cap
      const sp = Math.hypot(ball.vx, ball.vy);
      if (sp > MAX_SPD) { ball.vx *= MAX_SPD / sp; ball.vy *= MAX_SPD / sp; }

      // Scoring
      if (!resetting) {
        if (ball.x < -BS * 2) { rp.sc++; resetBall(-1); } // ball left  → human scores
        if (ball.x > W + BS * 2) { lp.sc++; resetBall(1); } // ball right → AI scores
      }
    }

    // ── Normal render ───────────────────────────────────────
    function drawNormal() {
      cx.fillStyle = '#ffffff';
      cx.fillRect(0, 0, W, H);

      // Border
      cx.strokeStyle = '#1d1d1f';
      cx.lineWidth = 2;
      cx.strokeRect(1, 1, W - 2, H - 2);

      // Center dashed line
      cx.save();
      cx.setLineDash([10, 14]);
      cx.lineWidth = 1;
      cx.strokeStyle = 'rgba(29,29,31,0.07)';
      cx.beginPath(); cx.moveTo(W / 2, 2); cx.lineTo(W / 2, H - 2); cx.stroke();
      cx.restore();

      // Scores
      cx.font = '500 60px "Inter Tight", sans-serif';
      cx.textBaseline = 'top'; cx.textAlign = 'center';
      cx.fillStyle = 'rgba(29,29,31,0.055)';
      cx.fillText(rp.sc, W * 0.25, 14);
      cx.fillText(lp.sc, W * 0.75, 14);

      // Left paddle — AI — red
      cx.fillStyle = '#FF2929';
      cx.fillRect(lp.x, lp.y, PW, PH);

      // Right paddle — player — green
      cx.fillStyle = '#00C853';
      cx.fillRect(rp.x, rp.y, PW, PH);

      // Ball ★
      cx.font = `${BS * 2.4}px serif`;
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillStyle = 'rgba(29,29,31,0.17)';
      cx.fillText('★', ball.x, ball.y);

      // Idle hint
      if (!started) {
        cx.fillStyle = 'rgba(29,29,31,0.1)';
        cx.font = '400 11px Inter, sans-serif';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText('move cursor here to begin', W / 2, H / 2 + 55);
      }
    }

    // ── ASCII render ─────────────────────────────────────────
    const CW = 9, CH = 16;
    const COLS = (W / CW) | 0;
    const ROWS = (H / CH) | 0;
    const NOISE = '!@#$%&*<>?/\\[]{}~^';
    const rch = () => NOISE[(Math.random() * NOISE.length) | 0];

    function drawASCII() {
      cx.fillStyle = '#080808';
      cx.fillRect(0, 0, W, H);

      cx.font = `${CH - 2}px "Courier New", Courier, monospace`;
      cx.textBaseline = 'top'; cx.textAlign = 'left';
      cx.shadowColor = '#00FF41'; cx.shadowBlur = 6;

      function g(col, row, ch, color) {
        if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
        cx.fillStyle = color;
        cx.fillText(ch, col * CW, row * CH);
      }

      const GRN = '#00FF41', DIM = '#003a0f', SC_C = '#1a5c1a';

      // Border
      for (let c = 0; c < COLS; c++) {
        g(c, 0,       (c === 0 || c === COLS - 1) ? '+' : '-', GRN);
        g(c, ROWS - 1,(c === 0 || c === COLS - 1) ? '+' : '-', GRN);
      }
      for (let r = 1; r < ROWS - 1; r++) {
        g(0,        r, '|', GRN);
        g(COLS - 1, r, '|', GRN);
      }

      // Center divider
      const mid = COLS >> 1;
      for (let r = 1; r < ROWS - 1; r += 2) g(mid, r, ':', DIM);

      // Scores (human left side, AI right side — mirror of normal mode)
      const sl = String(rp.sc), sr = String(lp.sc);
      for (let i = 0; i < sl.length; i++)
        g(((COLS * 0.25) | 0) + i - (sl.length >> 1), 1, sl[i], SC_C);
      for (let i = 0; i < sr.length; i++)
        g(((COLS * 0.75) | 0) + i - (sr.length >> 1), 1, sr[i], SC_C);

      // Left paddle (AI / red)
      const lc  = Math.max(1, (lp.x / CW + 1) | 0);
      const lr0 = Math.max(1, (lp.y / CH) | 0);
      const lr1 = Math.min(ROWS - 2, ((lp.y + PH) / CH) | 0);
      for (let r = lr0; r <= lr1; r++)
        g(lc, r, flicker && Math.random() < 0.35 ? rch() : '█', '#FF3333');

      // Right paddle (player / green)
      const rc  = Math.min(COLS - 2, ((rp.x + PW / 2) / CW) | 0);
      const rr0 = Math.max(1, (rp.y / CH) | 0);
      const rr1 = Math.min(ROWS - 2, ((rp.y + PH) / CH) | 0);
      for (let r = rr0; r <= rr1; r++)
        g(rc, r, flicker && Math.random() < 0.35 ? rch() : '█', '#44FF44');

      // Ball *
      const bc = Math.max(1, Math.min(COLS - 2, (ball.x / CW) | 0));
      const br = Math.max(1, Math.min(ROWS - 2, (ball.y / CH) | 0));
      g(bc, br, flicker && Math.random() < 0.5 ? rch() : '*', '#ffffff');

      // Flicker noise burst on mode switch
      if (flicker) {
        for (let i = 0; i < 14; i++)
          g(((Math.random() * (COLS - 2)) | 0) + 1,
            ((Math.random() * (ROWS - 2)) | 0) + 1,
            rch(), DIM);
      }

      cx.shadowBlur = 0;
    }

    // ── Loop ────────────────────────────────────────────────
    function loop() {
      update();
      ascii ? drawASCII() : drawNormal();
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
</body>
</html>
